<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Lower Third</title>
  <link rel="stylesheet" href="scoreboard.css">
</head>
<body>
  <div id="lower-third-container"></div>

  <script>
    let isAnimating = false;

    function renderLowerThird(data) {
      console.log('Rozpoczynanie renderLowerThird z danymi:', data);
      if (isAnimating) {
        console.log('Animacja w toku, pomijanie renderowania.');
        return;
      }

      const container = document.getElementById('lower-third-container');
      container.innerHTML = '';

      if (!data || !data.playerOut || !data.timestamp) {
        console.log('Brak wymaganych danych:', data);
        isAnimating = false;
        return;
      }

      isAnimating = true;
      console.log('Ustawiono isAnimating na true');

      const lowerThird = document.createElement('div');
      lowerThird.className = 'lower-third';

      const headerRow = document.createElement('div');
      headerRow.className = 'header-row';

      const teamHeader = document.createElement('div');
      teamHeader.className = `team-header ${data.team}`;
      teamHeader.innerHTML = `
        <div class="color"></div>
        <div class="name">
          <span id="team-name"></span>
        </div>
      `;
      headerRow.appendChild(teamHeader);

      const changeHeader = document.createElement('div');
      changeHeader.className = 'change-header';
      changeHeader.innerHTML = `<span id="change-label">${
        data.type === 'change' ? 'Zmiana' :
        data.type === 'yellow-card' ? 'Żółta Kartka' :
        data.type === 'red-card' ? 'Czerwona Kartka' :
        data.type === 'injury' ? 'Kontuzja' : 'Gol'
      }</span>`;
      headerRow.appendChild(changeHeader);

      lowerThird.appendChild(headerRow);

      const playerList = document.createElement('div');
      playerList.className = 'player-list';
      playerList.classList.add(data.type === 'change' && data.playerIn ? 'two-players' : 'one-player');

      const playerOut = document.createElement('div');
      playerOut.className = 'player out';
      const outSurname = data.playerOut.lastname;

      // Używamy emoji bezpośrednio zamiast prostokątów tła
      let indicatorHtml = '';
      switch (data.type) {
        case 'change':
          indicatorHtml = '<span class="arrow">➡️</span>';
          break;
        case 'yellow-card':
          indicatorHtml = '<span class="indicator yellow-card">🟨</span>';
          break;
        case 'red-card':
          indicatorHtml = '<span class="indicator red-card">🟥</span>';
          break;
        case 'injury':
          indicatorHtml = '<span class="indicator injury">➕</span>';
          break;
        case 'goal':
          indicatorHtml = '<span class="indicator goal">⚽</span>';
          break;
        default:
          indicatorHtml = '<span class="indicator unknown">?</span>';
      }

      // Nowa struktura: [indicatorHtml][nazwisko] - bez numeru zawodnika
      playerOut.innerHTML = `
        ${indicatorHtml}
        <span class="name">${outSurname}</span>
      `;
      playerList.appendChild(playerOut);

      if (data.type === 'change' && data.playerIn) {
        const playerIn = document.createElement('div');
        playerIn.className = 'player in';
        const inSurname = data.playerIn.lastname;
        // Nowa struktura dla playerIn: [arrow][nazwisko] - bez numeru zawodnika
        playerIn.innerHTML = `
          <span class="arrow">⬅️</span>
          <span class="name">${inSurname}</span>
        `;
        playerList.appendChild(playerIn);
      }

      lowerThird.appendChild(playerList);
      container.appendChild(lowerThird);

      fetch('/scorebug-data')
        .then(response => response.json())
        .then(scorebugData => {
          console.log('Pobrano scorebug-data:', scorebugData);
          document.getElementById('team-name').textContent = data.team === 'home' ? scorebugData.homeName : scorebugData.awayName;
          document.querySelector('.team-header .color').style.backgroundColor = data.team === 'home' ? scorebugData.homeColor : scorebugData.awayColor;
          document.querySelector('.team-header').style.backgroundColor = scorebugData.teamBackground;
          document.querySelector('.team-header .name').style.color = scorebugData.teamTextColor;
          document.querySelector('.change-header').style.backgroundColor = scorebugData.goalsBackground;
          document.querySelector('.change-header').style.color = scorebugData.goalsTextColor;
          document.querySelector('.player.out').style.backgroundColor = scorebugData.teamBackground;
          document.querySelector('.player.out').style.color = scorebugData.teamTextColor;
          if (data.type === 'change' && data.playerIn) {
            document.querySelector('.player.in').style.backgroundColor = scorebugData.teamTextColor;
            document.querySelector('.player.in').style.color = scorebugData.teamBackground;
          }
        })
        .catch(error => console.error('Błąd pobierania scorebug-data:', error));

      setTimeout(() => {
        console.log('Ukrywanie powiadomienia po 10 sekundach');
        lowerThird.classList.add('hide');
        setTimeout(() => {
          console.log('Czyszczenie kontenera i reset isAnimating');
          container.innerHTML = '';
          isAnimating = false;
        }, 500);
      }, 10000);

      localStorage.setItem('lastShownTimestamp', data.timestamp.toString());
      console.log('Zapisano lastShownTimestamp:', data.timestamp.toString());
    }

    setInterval(() => {
      console.log('Odpytywanie /notification-data');
      fetch('/notification-data')
        .then(response => response.json())
        .then(data => {
          console.log('Pobrano notification-data:', data);
          if (!data || !data.playerOut || !data.timestamp) {
            console.log('Brak powiadomienia do wyświetlenia:', data);
            return;
          }
          const lastShownTimestamp = localStorage.getItem('lastShownTimestamp');
          console.log('Porównanie timestamp:', { lastShownTimestamp, currentTimestamp: data.timestamp.toString() });
          if (!lastShownTimestamp || lastShownTimestamp !== data.timestamp.toString()) {
            console.log('Nowe powiadomienie, wywołanie renderLowerThird');
            renderLowerThird(data);
          } else {
            console.log('Powiadomienie już wyświetlone, pomijanie');
          }
        })
        .catch(error => console.error('Błąd pobierania notification-data:', error));
    }, 1000);
  </script>
</body>
</html>
